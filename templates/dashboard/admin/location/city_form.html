{% extends 'dashboard/admin/base.html' %}

{% block title %}{{ action }} مدينة{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="fw-bold mb-1"><i class="fas fa-city text-primary me-2"></i> {{ action }} مدينة</h4>
        <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{% url 'dashboard:admin_home' %}">الرئيسية</a></li>
            <li class="breadcrumb-item"><a href="{% url 'dashboard:admin_cities_list' %}">المدن</a></li>
            <li class="breadcrumb-item active">{{ action }}</li>
        </ol></nav>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom py-3">
                <h6 class="mb-0 fw-bold"><i class="fas fa-info-circle text-primary me-2"></i> بيانات المدينة</h6>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold">المحافظة <span class="text-danger">*</span></label>
                            <select name="governorate" class="form-select" required>
                                <option value="">-- اختر المحافظة --</option>
                                {% for gov in governorates %}
                                <option value="{{ gov.id }}"
                                    {% if obj and obj.governorate_id == gov.id %}selected{% endif %}>
                                    {{ gov.name_ar }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">الاسم بالعربية <span class="text-danger">*</span></label>
                            <input type="text" name="name_ar" class="form-control"
                                value="{{ obj.name_ar|default:'' }}" placeholder="مثال: الإسماعيلية" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">الاسم بالإنجليزية</label>
                            <input type="text" name="name_en" class="form-control"
                                value="{{ obj.name_en|default:'' }}" placeholder="e.g. Ismailia">
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
                                    {% if not obj or obj.is_active %}checked{% endif %}>
                                <label class="form-check-label fw-bold" for="is_active">نشطة</label>
                            </div>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i> {{ action }} المدينة
                        </button>
                        <a href="{% url 'dashboard:admin_cities_list' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-2"></i> إلغاء
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
