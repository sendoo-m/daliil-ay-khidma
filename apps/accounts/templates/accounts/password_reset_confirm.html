{% extends 'base.html' %}

{% block title %}تعيين كلمة مرور جديدة{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">🔑 كلمة مرور جديدة</h3>

                    {% if validlink %}
                        <form method="post">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label">{{ form.new_password1.label }}</label>
                                {{ form.new_password1 }}
                            </div>

                            <div class="mb-3">
                                <label class="form-label">{{ form.new_password2.label }}</label>
                                {{ form.new_password2 }}
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                حفظ كلمة المرور
                            </button>
                        </form>
                    {% else %}
                        <div class="alert alert-danger">
                            الرابط غير صالح. يرجى طلب رابط جديد.
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
