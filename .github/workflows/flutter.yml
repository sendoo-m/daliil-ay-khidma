name: Flutter

on:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

concurrency:
  group: flutter-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/dalil_app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate native projects
        run: flutter create --empty --platforms=android,ios --org=com.daliilaykhidma --project-name=dalil_app .
      - name: Configure password-reset deep links
        run: python3 tool/configure_deep_links.py
      - name: Configure Firebase clients
        run: python3 tool/configure_firebase.py
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Normalize generated and source formatting
        run: dart format lib test
      - run: flutter analyze
      - run: flutter test
      - name: Build Android debug APK
        run: flutter build apk --debug --dart-define=API_BASE_URL=https://example.invalid
      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: daliil-android-debug
          path: mobile/dalil_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
      - name: Upload generated native projects
        uses: actions/upload-artifact@v4
        with:
          name: daliil-native-projects
          path: |
            mobile/dalil_app/android
            mobile/dalil_app/ios
          if-no-files-found: error

  ios:
    name: Build iOS without signing
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile/dalil_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate native project
        run: flutter create --empty --platforms=ios --org=com.daliilaykhidma --project-name=dalil_app .
      - name: Configure password-reset deep links
        run: python3 tool/configure_deep_links.py
      - name: Configure Firebase clients
        run: python3 tool/configure_firebase.py
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Build iOS
        run: flutter build ios --debug --no-codesign --dart-define=API_BASE_URL=https://example.invalid
