name: Flutter

on:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

concurrency:
  group: flutter-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/dalil_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate native projects
        run: flutter create --empty --platforms=android,ios --org=com.daliilaykhidma --project-name=dalil_app .
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Normalize generated and source formatting
        run: dart format lib test
      - run: flutter analyze
      - run: flutter test
      - name: Build Android debug APK
        run: flutter build apk --debug --dart-define=API_BASE_URL=https://example.invalid

  ios:
    name: Build iOS without signing
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile/dalil_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate native project
        run: flutter create --empty --platforms=ios --org=com.daliilaykhidma --project-name=dalil_app .
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Build iOS
        run: flutter build ios --debug --no-codesign --dart-define=API_BASE_URL=https://example.invalid
