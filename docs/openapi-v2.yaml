components:
  schemas:
    AdminAnalytics:
      type: object
      description: Analytics data
      properties:
        period:
          type: string
        users:
          type: integer
        businesses:
          type: integer
        products:
          type: integer
        reviews:
          type: integer
        views:
          type: integer
        clicks:
          type: integer
      required:
      - businesses
      - clicks
      - period
      - products
      - reviews
      - users
      - views
    AdminBusiness:
      type: object
      description: Business serializer for admin
      properties:
        id:
          type: integer
          readOnly: true
        owner:
          type: string
          readOnly: true
        category:
          type: string
          readOnly: true
        business_type_display:
          type: string
          readOnly: true
        business_type:
          allOf:
          - $ref: '#/components/schemas/BusinessTypeEnum'
          title: نوع المحل / Business Type
          description: |-
            اختر نوع المحل: تجاري، حرفي، أو خدمة عامة

            * `shop` - محل تجاري / Commercial Shop
            * `craft` - حرفة أو خدمة حرفية / Craft or Trade Service
            * `public` - خدمة عامة / Public Service
        name_en:
          type: string
          title: Business Name (English)
          description: 'Example: Golden Restaurant, City Pharmacy, Ahmed the Plumber'
          maxLength: 200
        name_ar:
          type: string
          title: اسم المحل
          description: 'مثال: مطعم الذهبي، صيدلية المدينة، أحمد السباك'
          maxLength: 200
        slug:
          title: URL Slug
          oneOf:
          - type: string
            maxLength: 250
            pattern: ^[-a-zA-Z0-9_]+$
          - type: string
            maxLength: 0
        logo:
          type: string
          format: uri
          nullable: true
          description: 'Recommended: 500x500 px square image'
        cover_image:
          type: string
          format: uri
          nullable: true
          description: 'Wide banner image (Recommended: 1200x400 px)'
        phone:
          type: string
          title: Phone Number
          description: Egyptian mobile number (e.g., 01234567890)
          pattern: ^01[0-2,5]{1}[0-9]{8}$
          maxLength: 15
        whatsapp:
          title: WhatsApp Number
          description: WhatsApp number (optional)
          oneOf:
          - type: string
            pattern: ^01[0-2,5]{1}[0-9]{8}$
            maxLength: 15
          - type: string
            maxLength: 0
        email:
          title: Email Address
          oneOf:
          - type: string
            format: email
            maxLength: 254
          - type: string
            maxLength: 0
        website:
          title: Website URL
          description: Business website (optional)
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        facebook:
          title: Facebook Page
          description: Facebook page URL (optional)
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        instagram:
          title: Instagram Account
          description: Instagram profile URL (optional)
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        twitter:
          title: Twitter Account
          description: Twitter/X profile URL (optional)
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        tiktok:
          title: TikTok Account
          description: TikTok profile URL (optional)
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        address_en:
          type: string
          title: Address (English)
          description: Detailed address in English
        address_ar:
          type: string
          title: العنوان
          description: العنوان التفصيلي بالعربية
        location_url:
          title: Google Maps URL
          description: Google Maps location link (optional)
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
          description: Auto-determined from map
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
          description: Auto-determined from map
        description_en:
          type: string
          title: Description (English)
          description: Detailed description about the business and services
        description_ar:
          type: string
          title: الوصف
          description: وصف تفصيلي عن المحل والخدمات
        working_hours_en:
          type: string
          title: Working Hours (English)
          description: 'Example: Sat-Thu: 9 AM - 10 PM | Fri: 2 PM - 10 PM'
        working_hours_ar:
          type: string
          title: ساعات العمل
          description: 'مثال: السبت-الخميس: 9 ص-10 م | الجمعة: 2 م-10 م'
        average_rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          readOnly: true
          description: Auto-calculated from reviews
        total_reviews:
          type: integer
          readOnly: true
          description: Auto-calculated count of approved reviews
        view_count:
          type: integer
          readOnly: true
          description: Total number of page views
        click_count:
          type: integer
          readOnly: true
          description: Total clicks on contact buttons
        is_active:
          type: boolean
          title: Active
          description: Enable/disable business visibility on the site
        is_verified:
          type: boolean
          title: Verified
          description: Business has been verified by admin
        is_featured:
          type: boolean
          title: Featured
          description: Display in featured businesses section
        is_promoted:
          type: boolean
          title: Promoted
          description: Promoted businesses (paid promotion)
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        verified_at:
          type: string
          format: date-time
          nullable: true
          description: Date when business was verified
        district:
          type: integer
      required:
      - address_ar
      - address_en
      - average_rating
      - business_type_display
      - category
      - click_count
      - created_at
      - description_ar
      - description_en
      - district
      - id
      - name_ar
      - name_en
      - owner
      - phone
      - total_reviews
      - updated_at
      - view_count
